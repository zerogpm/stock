services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: stocks-dynamodb
    ports:
      - "8000:8000"
    # Persistent mode for Mac/Linux - data survives container restarts
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /data"
    volumes:
      - dynamodb-data:/data

volumes:
  dynamodb-data:
